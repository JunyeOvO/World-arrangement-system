[mcp_servers.ai_dispatcher]
command = "uv"
args = ["run", "--project", "/home/junye/ai-orchestrator-v1", "ai-dispatcher-mcp"]
startup_timeout_sec = 20
tool_timeout_sec = 1800
enabled = true
enabled_tools = [
  "list_projects",
  "detect_project",
  "submit_task",
  "submit_current_project_task",
  "get_task_status",
  "read_task_result",
  "cancel_task",
  "rollback_task",
  "open_task_artifacts",
]
default_tools_approval_mode = "prompt"

[mcp_servers.ai_dispatcher.tools.list_projects]
approval_mode = "approve"

[mcp_servers.ai_dispatcher.tools.detect_project]
approval_mode = "approve"

[mcp_servers.ai_dispatcher.tools.submit_task]
approval_mode = "approve"

[mcp_servers.ai_dispatcher.tools.submit_current_project_task]
approval_mode = "approve"

[mcp_servers.ai_dispatcher.tools.get_task_status]
approval_mode = "approve"

[mcp_servers.ai_dispatcher.tools.read_task_result]
approval_mode = "approve"

[mcp_servers.ai_dispatcher.tools.cancel_task]
approval_mode = "prompt"

[mcp_servers.ai_dispatcher.tools.rollback_task]
approval_mode = "prompt"

[mcp_servers.ai_dispatcher.tools.open_task_artifacts]
approval_mode = "approve"

