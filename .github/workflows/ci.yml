name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check .
      - name: Schema and config gates
        run: uv run pytest tests/test_schemas.py tests/test_ci_gates.py tests/test_env_profiles.py
      - name: Test
        run: uv run pytest -q --disable-warnings
